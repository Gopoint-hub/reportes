<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reportes — GoPoint Agency</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e1e4ea;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container { max-width: 480px; width: 100%; padding: 40px 24px; }
    h1 { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 8px; }
    .subtitle { color: #8b8fa3; font-size: 14px; margin-bottom: 32px; }
    .client-list { list-style: none; }
    .client-list a {
      display: block;
      padding: 16px 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      color: #fff;
      text-decoration: none;
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 12px;
      transition: background 0.2s, border-color 0.2s;
    }
    .client-list a:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.15);
    }
    .client-list a span {
      color: #8b8fa3;
      font-size: 13px;
      font-weight: 400;
      display: block;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Reportes</h1>
    <p class="subtitle">GoPoint Agency — Reportes de campañas</p>
    <ul class="client-list">
      <li><a href="./cancagua/">Cancagua<span>Meta Ads + Google Ads — Mar 2025 a Mar 2026</span></a></li>
      <li><a href="./patagonia-fit/">Patagonia Fit & Rehab<span>Meta Ads + Google Ads — May 2025 a Mar 2026</span></a></li>
      <li><a href="./groner/">GRÖNER<span>Meta Ads — Campañas activas</span></a></li>
    </ul>
  </div>
</body>
</html>
